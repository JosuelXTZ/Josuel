<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notícias - Josuel News</title>

<style>
body{
font-family: Arial;
background:#f0f4ff;
margin:0;
}

header{
background:#1e3a8a;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

#noticias{
display:grid;
grid-template-columns:1fr;
gap:20px;
padding:20px;
}

.noticia{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.noticia img{
width:100%;
height:200px;
object-fit:cover;
}

.noticia h2{
font-size:18px;
padding:10px;
}

.noticia p{
padding:0 10px 10px;
}

footer{
text-align:center;
padding:20px;
color:#555;
}
</style>
</head>

<body>

<header>
Josuel News
</header>

<div id="noticias">
Carregando notícias...
</div>

<footer>
Atualiza automaticamente todos os dias
</footer>

<script>

const url = "https://api.spaceflightnewsapi.net/v4/articles";

async function carregarNoticias(){

let resposta = await fetch(url);
let dados = await resposta.json();

let noticiasHTML = "";

dados.results.slice(0,10).forEach(noticia=>{

noticiasHTML += `
<div class="noticia">
<img src="${noticia.image_url}">
<h2>${noticia.title}</h2>
<p>${noticia.summary}</p>
</div>
`;

});

document.getElementById("noticias").innerHTML = noticiasHTML;

}

carregarNoticias();

// atualiza a cada 24 horas
setInterval(carregarNoticias, 86400000);

</script>

</body>
</html>
