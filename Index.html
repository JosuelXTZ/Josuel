<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Quiz do Josuel</title>

<style>
body{
font-family: Arial;
background:#0a2a66;
color:white;
text-align:center;
padding:20px;
}

#quiz{
background:white;
color:black;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
}

button{
padding:10px;
margin:5px;
border:none;
background:#0a2a66;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e4bb8;
}
</style>

</head>
<body>

<h1>Quiz de Perguntas</h1>

<div id="quiz">
<h2 id="pergunta"></h2>

<div id="respostas"></div>

<p id="resultado"></p>
</div>

<script>

let perguntas = [

{
pergunta: "Qual é a capital do Brasil?",
respostas: ["Rio de Janeiro","Brasília","São Paulo","Salvador"],
correta: 1
},

{
pergunta: "Quanto é 5 + 5?",
respostas: ["8","10","12","6"],
correta: 1
},

{
pergunta: "Qual planeta é chamado de planeta vermelho?",
respostas: ["Terra","Marte","Júpiter","Saturno"],
correta: 1
},

{
pergunta: "Quem descobriu o Brasil?",
respostas: ["Pedro Álvares Cabral","Dom Pedro","Cristóvão Colombo","Tiradentes"],
correta: 0
}

];

let atual = 0;

function mostrarPergunta(){

let p = perguntas[atual];

document.getElementById("pergunta").innerText = p.pergunta;

let respostasHTML = "";

p.respostas.forEach((r,i)=>{
respostasHTML += `<button onclick="responder(${i})">${r}</button><br>`;
});

document.getElementById("respostas").innerHTML = respostasHTML;

}

function responder(i){

let correta = perguntas[atual].correta;

if(i === correta){
document.getElementById("resultado").innerText = "Resposta correta!";
}else{
document.getElementById("resultado").innerText = "Resposta errada!";
}

atual++;

if(atual < perguntas.length){
setTimeout(()=>{
document.getElementById("resultado").innerText="";
mostrarPergunta();
},1000);
}else{
document.getElementById("quiz").innerHTML="<h2>Quiz terminado!</h2>";
}

}

mostrarPergunta();

</script>

</body>
</html>
