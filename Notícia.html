<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Portal Josuel Notícias</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f1f1f1;
}

header{
background:#c4170c;
color:white;
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
}

.menu{
background:#a50f07;
padding:10px;
text-align:center;
}

.menu a{
color:white;
text-decoration:none;
margin:15px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.15);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card-content h3{
margin:0;
font-size:20px;
}

.card-content p{
color:#555;
font-size:14px;
}

footer{
background:#222;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
}

</style>
</head>

<body>

<header>
Portal Josuel Notícias
</header>

<div class="menu">
<a href="#">Início</a>
<a href="#">Brasil</a>
<a href="#">Mundo</a>
<a href="#">Tecnologia</a>
<a href="#">Esporte</a>
</div>

<div class="container" id="news"></div>

<footer>
© 2026 Portal Josuel Notícias
</footer>

<script>

const api = "https://api.rss2json.com/v1/api.json?rss_url=https://g1.globo.com/rss/g1/";

fetch(api)
.then(res => res.json())
.then(data => {

let container = document.getElementById("news");

data.items.slice(0,20).forEach(noticia => {

container.innerHTML += `
<div class="card">
<img src="${noticia.thumbnail}">
<div class="card-content">
<h3><a href="${noticia.link}" target="_blank">${noticia.title}</a></h3>
<p>${noticia.pubDate}</p>
</div>
</div>
`;

});

});

</script>

</body>
</html>
