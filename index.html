<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>JM Notícias</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef3ff;
}

header{
background:#0b5cff;
color:white;
padding:25px;
text-align:center;
}

nav{
background:white;
display:flex;
justify-content:center;
gap:15px;
padding:12px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
flex-wrap:wrap;
}

nav button{
border:none;
background:#0b5cff;
color:white;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

#pesquisa{
text-align:center;
margin:20px;
}

#pesquisa input{
padding:10px;
width:300px;
border-radius:5px;
border:1px solid #ccc;
}

#destaque{
padding:20px;
}

.destaque-card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.destaque-card img{
width:100%;
height:300px;
object-fit:cover;
}

.destaque-card h2{
padding:15px;
}

#noticias{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:18px;
}

.card a{
display:block;
padding:10px;
color:#0b5cff;
text-decoration:none;
font-weight:bold;
}

footer{
background:#0b5cff;
color:white;
text-align:center;
padding:15px;
}

</style>
</head>

<body>

<header>
<h1>JM Notícias</h1>
<p>Notícias atualizadas todos os dias</p>
</header>

<nav>
<button onclick="carregar('brasil')">Brasil</button>
<button onclick="carregar('world')">Mundo</button>
<button onclick="carregar('technology')">Tecnologia</button>
<button onclick="carregar('sports')">Esportes</button>
</nav>

<div id="pesquisa">
<input type="text" id="buscar" placeholder="Pesquisar notícia..." onkeyup="pesquisar()">
</div>

<div id="destaque"></div>

<div id="noticias"></div>

<footer>
© 2026 - JM Notícias
</footer>
