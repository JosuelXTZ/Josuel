<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>josuel.moreira.da.silva - Jogos</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

h1{
padding:20px;
}

.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
background:#1e1e1e;
border-radius:15px;
padding:20px;
width:220px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card:hover{
transform:scale(1.05);
background:#333;
}

iframe{
width:100%;
height:80vh;
border:none;
}

#gameArea{
display:none;
}

button{
margin:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#00ffaa;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#00cc88;
}

</style>

<script>

function abrirJogo(link){
document.getElementById("menu").style.display="none";
document.getElementById("gameArea").style.display="block";
document.getElementById("frame").src=link;
}

function voltar(){
document.getElementById("menu").style.display="flex";
document.getElementById("gameArea").style.display="none";
document.getElementById("frame").src="";
}

</script>

</head>

<body>

<h1>🎮 Site de Jogos - Josuel Moreira da Silva</h1>

<div id="menu" class="menu">

<div class="card" onclick="abrirJogo('https://cardgames.io/checkers/')">
<h2>♟️ Damas</h2>
<p>Jogue damas online</p>
</div>

<div class="card" onclick="abrirJogo('https://www.jigsawplanet.com/?rc=play&pid=0f6a6d0a1d35')">
<h2>🧩 Quebra-cabeça</h2>
<p>Monte o puzzle</p>
</div>

<div class="card" onclick="abrirJogo('https://cardgames.io/solitaire/')">
<h2>🃏 Baralho</h2>
<p>Jogo de paciência</p>
</div>

</div>

<div id="gameArea">
<button onclick="voltar()">⬅ Voltar ao menu</button>
<iframe id="frame"></iframe>
</div>

</body>
</html>
