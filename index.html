<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Josuel Notícias</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f6ff;
}

header{
background:#1565ff;
color:white;
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
}

nav{
background:white;
border-bottom:2px solid #1565ff;
text-align:center;
padding:12px;
}

nav a{
margin:12px;
text-decoration:none;
color:#1565ff;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.destaque{
display:flex;
gap:20px;
background:white;
border-radius:10px;
padding:15px;
margin-bottom:30px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.destaque img{
width:60%;
border-radius:10px;
object-fit:cover;
}

.destaque h2{
margin:0;
color:#1565ff;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:10px;
}

.card-content a{
text-decoration:none;
color:#1565ff;
font-weight:bold;
}

footer{
background:#1565ff;
color:white;
text-align:center;
padding:15px;
margin-top:30px;
}

</style>
</head>

<body>

<header>
Josuel Notícias
</header>

<nav>
<a href="#">Início</a>
<a href="#">Mundo</a>
<a href="#">Política</a>
<a href="#">Tecnologia</a>
</nav>

<div class="container">

<div id="principal"></div>

<div class="grid" id="noticias"></div>

</div>

<footer>
Portal criado por Josuel
</footer>

<script>

const api="https://api.rss2json.com/v1/api.json?rss_url=https://rss.dw.com/xml/rss-pt-br-all"

fetch(api)
.then(res=>res.json())
.then(data=>{

let noticias=data.items

let principal=document.getElementById("principal")
let grid=document.getElementById("noticias")

let destaque=noticias[0]

let img=destaque.thumbnail || "https://picsum.photos/600/400"

principal.innerHTML=`

<div class="destaque">

<img src="${img}">

<div>

<h2>
<a href="${destaque.link}" target="_blank">
${destaque.title}
</a>
</h2>

<p>${destaque.pubDate}</p>

</div>

</div>

`

noticias.slice(1,25).forEach(n=>{

let imagem=n.thumbnail || "https://picsum.photos/400/200"

grid.innerHTML+=`

<div class="card">

<img src="${imagem}">

<div class="card-content">

<a href="${n.link}" target="_blank">
${n.title}
</a>

</div>

</div>

`

})

})

</script>

</body>
</html>
